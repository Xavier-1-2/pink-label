<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Receipt</title>
  <link rel="stylesheet" href="../styles/index.css">

  <style>
    .receipt {
      max-width: 650px;
      margin: 120px auto;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
    }

    .receipt h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 10px;
      color: var(--charcoal);
    }

    .receipt-sub {
      color: var(--warm-gray);
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    .receipt-info {
      margin-bottom: 25px;
      font-size: 0.9rem;
      color: var(--charcoal);
      line-height: 1.6;
    }

    .receipt-items {
      margin: 25px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .receipt-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .receipt-total {
      margin-top: 20px;
      font-size: 1.2rem;
      font-family: 'Playfair Display', serif;
      display: flex;
      justify-content: space-between;
    }

    .btn-home {
      margin-top: 30px;
      width: 100%;
      padding: 14px;
      background: var(--deep-rose);
      color: white;
      border: none;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-home:hover {
      background: #a33a5a;
      transform: translateY(-1px);
    }

    .divider {
      margin: 20px 0;
      border: none;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

<div class="receipt">

  <h1>Thank You 💖</h1>
  <div class="receipt-sub">Your order has been placed successfully</div>

  <div class="receipt-info">
    <p id="customer"></p>
    <p id="address"></p>
  </div>

  <hr class="divider">

  <div id="receiptItems" class="receipt-items"></div>

  <hr class="divider">

  <div class="receipt-total">
    <span>Total</span>
    <strong id="total"></strong>
  </div>

  <button class="btn-home" onclick="goHome()">Back to Shop</button>

</div>

<script src="../js_code/receipt.js"></script>

</body>
</html>
